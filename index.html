<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dual Scanner Fix</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020202;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 30px 3px 0 3px; /* Đúng lề 30px trên, 3px 2 bên */
            display: flex;
            justify-content: center;
        }

        .main-frame {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .box {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
        }

        /* Nút bấm mới to và dễ bấm hơn */
        .btn-trigger {
            display: block;
            width: 80%;
            margin: 0 auto 20px auto;
            background: transparent;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .blue-btn { border: 2px solid var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        .purple-btn { border: 2px solid var(--neon-purple); color: var(--neon-purple); box-shadow: 0 0 10px rgba(188, 19, 254, 0.2); }

        .btn-trigger:hover { background: white; color: black; box-shadow: 0 0 20px white; }

        .display-num {
            font-size: 8rem;
            font-weight: 900;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            text-shadow: 0 0 20px currentColor;
        }

        .countdown-text {
            font-family: monospace;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar { height: 100%; width: 0%; transition: width 0.1s linear; }
        .blue-bar { background: var(--neon-blue); }
        .purple-bar { background: var(--neon-purple); }

        /* Ẩn input file thật */
        input[type="file"] { display: none !important; }
    </style>
</head>
<body>

    <div class="main-frame">
        <div class="box">
            <button class="btn-trigger blue-btn" onclick="document.getElementById('file1').click()">MỞ FILE 1 (7s)</button>
            <input type="file" id="file1" accept=".txt" onchange="handleFile(this, 1)">
            
            <div id="num1" class="display-num" style="color: var(--neon-blue);">--</div>
            <div class="countdown-text" id="time1">0.0s</div>
            <div class="progress-container">
                <div class="progress-bar blue-bar" id="bar1"></div>
            </div>
        </div>

        <div class="box">
            <button class="btn-trigger purple-btn" onclick="document.getElementById('file2').click()">MỞ FILE 2 (30s)</button>
            <input type="file" id="file2" accept=".txt" onchange="handleFile(this, 2)">
            
            <div id="num2" class="display-num" style="color: var(--neon-purple);">--</div>
            <div class="countdown-text" id="time2">0.0s</div>
            <div class="progress-container">
                <div class="progress-bar purple-bar" id="bar2"></div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            1: { digits: [], index: 0, interval: 7000, lastUpdate: 0, timer: null },
            2: { digits: [], index: 0, interval: 30000, lastUpdate: 0, timer: null }
        };

        function handleFile(input, id) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                config[id].digits = text.replace(/\D/g, '').split('');
                config[id].index = 0;
                if (config[id].digits.length > 0) {
                    config[id].lastUpdate = Date.now();
                    if (config[id].timer) cancelAnimationFrame(config[id].timer);
                    animate(id);
                }
            };
            reader.readAsText(file);
        }

        function animate(id) {
            const item = config[id];
            const now = Date.now();
            const elapsed = now - item.lastUpdate;
            const remaining = Math.max(0, item.interval - elapsed);
            
            // Cập nhật Progress Bar và Chữ số đếm ngược
            const percent = (elapsed / item.interval) * 100;
            document.getElementById(`bar${id}`).style.width = Math.min(percent, 100) + '%';
            document.getElementById(`time${id}`).innerText = (remaining/1000).toFixed(1) + "s";

            // Kiểm tra đổi số
            if (elapsed >= item.interval || (item.index === 0 && elapsed <= 20)) {
                if (item.index < item.digits.length) {
                    document.getElementById(`num${id}`).innerText = item.digits[item.index];
                    item.index++;
                    item.lastUpdate = now;
                } else {
                    document.getElementById(`num${id}`).innerText = "END";
                    document.getElementById(`time${id}`).innerText = "DONE";
                    return;
                }
            }
            item.timer = requestAnimationFrame(() => animate(id));
        }
    </script>
</body>
</html>
