<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Chuẩn - Logic 5 Ô Sau</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    max-width: 420px;
    margin: auto;
    padding: 10px;
    text-align: center;
  }

  .top-display {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 15px 0;
  }
  .top-display input {
    width: 45px;
    height: 45px;
    border-radius: 8px;
    border: 2px solid #38bdf8;
    background: #ef4444; /* Đỏ */
    color: white;
    text-align: center;
    font-size: 30px;
    font-weight: bold;
    outline: none;
  }

  .input-section {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    border: 1px solid #334155;
    position: relative;
  }

  #input50 {
    width: 80px;
    height: 60px;
    font-size: 35px;
    text-align: center;
    border-radius: 10px;
    border: 3px solid #f43f5e;
    background: #0f172a;
    color: #f43f5e;
    font-weight: bold;
    outline: none;
  }

  /* Nút Xóa/Hoàn tác */
  .btn-undo {
    margin-top: 10px;
    padding: 8px 15px;
    background: #475569;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-undo:active { background: #64748b; }

  #cell49 {
    display: inline-block;
    width: 45px;
    height: 45px;
    background: #fbbf24;
    color: #000;
    line-height: 45px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 22px;
    margin-top: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    margin-top: 10px;
    direction: rtl; 
  }
  .cell {
    height: 38px;
    background: #334155;
    border: 1px solid #475569;
    line-height: 38px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 4px;
    direction: ltr; 
  }

  .match-origin {
    background: #ef4444 !important;
    color: #ffffff !important;
    border: 2px solid #ffffff;
  }

  .blink-gradient {
    animation: gentleGradient 1.5s infinite alternate ease-in-out;
    border: 1px solid rgba(255, 255, 255, 0.4);
  }

  @keyframes gentleGradient {
    0% { background: linear-gradient(135deg, #2563eb, #06b6d4); }
    100% { background: linear-gradient(135deg, #7c3aed, #db2777); }
  }
</style>
</head>
<body>
<div>Gặp 01-51-55-44-70 bắt buộc đánh 00000</div>
  <div>Gặp 11-22-99-987-66-40 bắt buộc đánh 11111</div>
  <div>Gặp 10-bắt buộc đánh 100</div>
<div class="top-display" id="topRes"></div>

<div class="input-section">
  <div style="font-size: 12px; color: #94a3b8;">NHẬP Ô 50</div>
  <input id="input50" type="tel" maxlength="1" autocomplete="off">
  <br>
  <button class="btn-undo" onclick="undo()">↩ Xóa nhập nhầm</button>
  <br>
  <div style="font-size: 12px; color: #94a3b8; margin-top: 10px;">Ô 49</div>
  <div id="cell49">-</div>
</div>

<div class="grid" id="mainGrid"></div>

<script>
const input50 = document.getElementById("input50");
const cell49 = document.getElementById("cell49");
const mainGrid = document.getElementById("mainGrid");
const topRes = document.getElementById("topRes");

let data48 = Array(48).fill(""); 
let val49 = "";
let topInputs = [];

// Khởi tạo 5 ô kết quả trên cùng
for(let i=0; i<5; i++) {
  let inp = document.createElement("input");
  inp.readOnly = true;
  topRes.appendChild(inp);
  topInputs.push(inp);
}

// Khởi tạo lưới 48 ô
for(let i=0; i<48; i++) {
  let d = document.createElement("div");
  d.className = "cell";
  d.id = "idx" + i;
  mainGrid.appendChild(d);
}

function updateUI() {
  // Cập nhật ô 49
  cell49.innerText = val49 || "-";

  // Cập nhật 48 ô dưới
  for (let i = 0; i < 48; i++) {
    const el = document.getElementById("idx" + i);
    el.innerText = data48[i];
    el.classList.remove("blink-gradient", "match-origin");
  }

  // Reset top display
  topInputs.forEach(input => input.value = "");

  // Chạy logic tìm kiếm
  let foundIndex = -1;
  for (let i = 0; i < 48; i++) {
    if (data48[i] === val49 && val49 !== "") {
      let hasEnoughData = true;
      for (let k = 1; k <= 5; k++) {
        let checkIdx = i - k;
        if (checkIdx < 0 || data48[checkIdx] === "") {
          hasEnoughData = false;
          break;
        }
      }
      if (hasEnoughData) {
        foundIndex = i;
        break; 
      }
    }
  }

  if (foundIndex !== -1) {
    document.getElementById("idx" + foundIndex).classList.add("match-origin");
    for (let j = 1; j <= 5; j++) {
      let rightIdx = foundIndex - j;
      topInputs[j-1].value = data48[rightIdx];
      document.getElementById("idx" + rightIdx).classList.add("blink-gradient");
    }
  }
}

// Hàm Hoàn tác (Sửa lỗi khi nhập nhầm)
function undo() {
  if (val49 === "") return; // Chưa có gì để xóa

  // Trả giá trị ô 49 về giá trị mới nhất của hàng 48
  val49 = data48[0];

  // Đẩy hàng 48 ngược lại
  for (let i = 0; i < 47; i++) {
    data48[i] = data48[i+1];
  }
  data48[47] = ""; // Ô cuối cùng trống

  updateUI();
  input50.focus();
}

input50.addEventListener("input", function() {
  const val = this.value.trim();
  if (val === "") return;

  // Dịch chuyển dữ liệu cũ sang phải
  for (let i = 47; i > 0; i--) {
    data48[i] = data48[i-1];
  }
  
  // Giá trị cũ của ô 49 rơi xuống ô 0 của hàng 48
  data48[0] = val49;
  
  // Giá trị mới nhập vào ô 49
  val49 = val;

  updateUI();
  this.value = "";
});

// Luôn focus vào ô nhập
document.body.addEventListener("click", (e) => {
    if(e.target.tagName !== 'BUTTON') input50.focus();
});
input50.focus();
</script>
</body>
</html>
