<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>0-9 Matrix</title>

<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
margin-top:80px;
color:white
}

.panel{
background:#1e293b;
padding:25px;
border-radius:12px
}

.row{
display:flex;
gap:15px
}

.box{
display:flex;
flex-direction:column;
align-items:center
}

label{
margin-bottom:6px;
font-weight:bold
}

input{
width:50px;
height:50px;
font-size:30px;
font-weight:bold;
text-align:center;
border:none;
border-radius:8px
}

.result{
margin:25px auto;
font-size:40px;
font-weight:bold;
text-align:center;
color: white;
border: 1px solid white;
border-radius:8px;
width:60%;
background: red;
padding:8px 14px;   /* khoảng cách giữa chữ và khung */



animation:blink 0.8s infinite alternate;
text-shadow:
0 0 8px white,
0 0 16px white,
0 0 24px rgba(34,197,94,0.7);
}

@keyframes blink{
from{
opacity:1;
transform:scale(1);
}
to{
opacity:0.4;
transform:scale(1.05);
}
}



.inputBox{
margin-top:20px;
text-align:center
}

.inputBox input{
width:120px;
height:60px;
font-size:28px
}

.title{
text-align:center;
font-size:26px;
font-weight:bold;
margin-bottom:25px;
letter-spacing:3px;

background:linear-gradient(90deg,#38bdf8,#a78bfa,#f472b6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 8px rgba(168,85,247,0.6),
0 0 16px rgba(56,189,248,0.4);

animation:glow 3s ease-in-out infinite alternate;
}

@keyframes glow{
from{
text-shadow:
0 0 6px rgba(168,85,247,0.4),
0 0 12px rgba(56,189,248,0.3);
}
to{
text-shadow:
0 0 12px rgba(168,85,247,0.9),
0 0 22px rgba(56,189,248,0.8);
}
}

.flash{
animation:flashBox 0.6s;
box-shadow:
0 0 10px #22c55e,
0 0 20px #22c55e,
0 0 30px #22c55e;
}

@keyframes flashBox{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}



</style>
</head>

<body>

<div class="panel">
<div class="title">Logic 0-9 matrix</div>
<div class="row">
<div class="box"><label>A</label><input id="A" readonly></div>
<div class="box"><label>B</label><input id="B" readonly></div>
<div class="box"><label>C</label><input id="C" readonly></div>
<div class="box"><label>D</label><input id="D" readonly></div>
</div>

<div class="inputBox">
<input id="INPUT" type="tel" inputmode="numeric" placeholder="Nhập số">
</div>

<div id="result" class="result">...</div>

</div>

<script>

const A=document.getElementById("A")
const B=document.getElementById("B")
const C=document.getElementById("C")
const D=document.getElementById("D")
const INPUT=document.getElementById("INPUT")
const result=document.getElementById("result")

window.onload=()=>INPUT.focus()

INPUT.addEventListener("input",()=>{

let v=parseInt(INPUT.value)
if(isNaN(v)) return

// dịch chuyển 4 số
A.value=B.value
B.value=C.value
C.value=D.value
D.value=v

INPUT.value=""
INPUT.focus()

let a=parseInt(A.value)
let b=parseInt(B.value)
let c=parseInt(C.value)
let d=parseInt(D.value)

if(!isNaN(a)&&!isNaN(b)&&!isNaN(c)&&!isNaN(d)){
result.textContent=logic(a,b,c,d)
}

})

function logic(a,b,c,d){

switch(d){
////////////////////////////////////////////////////////////////
case 0:

// gặp 000
// gặp 000
if(a==0 && b==0 && c==0){
flash(A)
flash(B)
flash(C)
return 0
}

// trước 0 có 2 số <5
if(b<5 && c<5) return 0

// trước 0 có 2 số >5
if(b>=5 && c>=5) return 1

// trước 0 có 1 số <5
if( c<5) return 1 
         
if( c==7)
 {
flash(C)
return 0
}



// còn lại
return 0

////////////////////////////////////////////////////////////////
case 1:

if(b==2 && c==3){
flash(B)
flash(C)
return 0
}

return 1


////////////////////////////////////////////////////////////////
case 2:

if(b==9 && c==6) {
flash(B)
flash(C)
return 0
}



// 2 số >5
if(c >= 5) return 0

if(c < 5){
   if(b < 5) return 0
   else return 1
}

// còn lại
return "BỎ QUA"

////////////////////////////////////////////////////////////////


case 3:

if(c==3 && d==3){
flash(C)
flash(D)
return 0
}

// trước số 3 có 2 số <5
if(b<5 && c<5) return 1

// còn lại
return 0

////////////////////////////////////////////////////////////////
case 4:

// trước số 4 có 2 số <5
if(b < 5 && c < 5) return 1


if(b==6 && c==0) {
flash(B)
flash(C)
return 1
}

 if(b==5 && c==3) {
flash(B)
flash(C)
return 0
}

                  

// còn lại
return 0

////////////////////////////////////////////////////////////////
case 5: 
  if( c == 4 ) {
flash(C)
return 1
}

  return 1

////////////////////////////////////////////////////////////////

case 6:

// 2 số >5
if( c >= 5) return 1

// 2 số <5
if(b < 5 && c < 5) return 1

// 1 lớn 1 nhỏ
if((b >= 5 && c <= 5) || (b <= 5 && c >= 5)) return 0

  if(a==8 && b==8 && c == 0) 
  {
flash(A)
flash(B)
flash(C)
return 1
}

// còn lại
return "BỎ QUA"

////////////////////////////////////////////////////////////////
case 7:

// 3 số liên tiếp đều >7
if(a >= 7 && b >= 7&& c >= 7) return 1

if((b==5 && c==2) || (b==2 && c==5)) 
 {

flash(B)
flash(C)
return 1
}

                  
// sau 0 mà >7
if(c == 0) 
{
flash(C)
return 1
}

if( c==7) {
flash(C)
return 1
}



// trước 7 có 2 số <5
if(b <= 5 && c <= 5) return 0



// ngoài các trường hợp trên
return "BỎ QUA"

////////////////////////////////////////////////////////////////
case 8:
if(b==c && b<=5) return 1
if(a==7 && b==9 && c == 0) 
 {
flash(A)
flash(B)
flash(C)
return 1
}


return 0

////////////////////////////////////////////////////////////////
case 9:
if(b==3 && c==0) 
 {
flash(B)
flash(C)
return 0
}

// 2 số <5
if(b < 5 && c < 5) return 1

// 1 số <5 và 1 số >5
if((b <= 5 && c >= 5) || (b >= 5 && c <= 5)) return 1
 if( b==5 && c == 0)
  {
flash(B)
flash(C)
return 0
}

if( c == 9) 
 {
flash(C)
return 1
}

// ngoài 2 trường hợp trên
return "BỎ QUA"
////////////////////////////////////////////////////////////////

}

return 0
}


function flash(box){
box.classList.add("flash")

setTimeout(()=>{
box.classList.remove("flash")
},600)
}

</script>

</body>
</html>
